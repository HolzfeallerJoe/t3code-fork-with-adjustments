name: Sync Fork with Upstream (Stable Releases Only)

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force sync even if already on latest stable"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch tags
        run: |
          git remote add upstream https://github.com/pingdotgg/t3code.git || true
          git fetch upstream --tags

      - name: Find latest stable release tag
        id: find_stable
        run: |
          # Find latest stable tag (vX.Y.Z format, excluding anything with a hyphen suffix like -nightly, -beta, etc.)
          # Sort by version number descending, take first match
          LATEST_STABLE=$(git tag -l 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$LATEST_STABLE" ]; then
            echo "No stable release tags found in upstream"
            echo "has_stable=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Latest stable release: $LATEST_STABLE"
          echo "latest_tag=$LATEST_STABLE" >> $GITHUB_OUTPUT
          echo "has_stable=true" >> $GITHUB_OUTPUT

      - name: Check if already synced to latest stable
        id: check_changes
        if: steps.find_stable.outputs.has_stable == 'true'
        run: |
          LATEST_TAG="${{ steps.find_stable.outputs.latest_tag }}"
          TAG_COMMIT=$(git rev-parse "$LATEST_TAG^{commit}")

          # Check if this tag's commit is already in our history
          if git merge-base --is-ancestor "$TAG_COMMIT" HEAD; then
            echo "Already synced to $LATEST_TAG (or newer)"
            echo "needs_sync=false" >> $GITHUB_OUTPUT
          else
            echo "New stable release $LATEST_TAG available"
            echo "needs_sync=true" >> $GITHUB_OUTPUT
          fi

      - name: Attempt merge
        id: merge
        if: steps.find_stable.outputs.has_stable == 'true' && (steps.check_changes.outputs.needs_sync == 'true' || github.event.inputs.force_sync == 'true')
        continue-on-error: true
        run: |
          LATEST_TAG="${{ steps.find_stable.outputs.latest_tag }}"
          echo "Merging stable release $LATEST_TAG..."
          git merge "$LATEST_TAG" --no-edit -m "Merge upstream stable release $LATEST_TAG"
          echo "merge_success=true" >> $GITHUB_OUTPUT

      - name: Check for merge conflicts
        if: steps.merge.outcome == 'failure'
        run: |
          git merge --abort || true
          echo "MERGE_CONFLICT=true" >> $GITHUB_ENV

      - name: Push changes
        if: steps.merge.outcome == 'success'
        run: |
          git push origin main

      - name: Create issue on conflict
        if: env.MERGE_CONFLICT == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const latestTag = '${{ steps.find_stable.outputs.latest_tag }}';
            const title = `⚠️ Upstream Sync Failed - Manual Merge Required (${latestTag})`;
            const body = `## Upstream Sync Conflict

            The automatic sync with upstream stable release failed due to merge conflicts.

            ### What happened
            - Upstream repository: \`pingdotgg/t3code\`
            - Attempted to merge: \`${latestTag}\` (stable release)
            - Result: **Merge conflict detected**

            ### Required action
            Please resolve the conflicts manually:

            \`\`\`bash
            # Add upstream if not already added
            git remote add upstream https://github.com/pingdotgg/t3code.git

            # Fetch upstream tags
            git fetch upstream --tags

            # Merge the stable release tag
            git merge ${latestTag}

            # Resolve conflicts, then commit and push
            git add .
            git commit -m "Merge upstream stable release ${latestTag}"
            git push origin main
            \`\`\`

            ### Workflow run
            [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *This issue was automatically created by the sync-upstream workflow.*`;

            // Check if a similar issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            const existingIssue = issues.data.find(issue => 
              issue.title.includes('Upstream Sync Failed')
            );

            if (existingIssue) {
              // Update existing issue with a comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `🔄 Another sync attempt failed for \`${latestTag}\` at ${new Date().toISOString()}\n\n[View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['upstream-sync', 'needs-attention']
              });
            }

      - name: Summary
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.find_stable.outputs.has_stable }}" == "false" ]; then
            echo "⚠️ No stable release tags found in upstream" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.check_changes.outputs.needs_sync }}" == "false" ]; then
            echo "✅ Fork is already synced to latest stable release (${{ steps.find_stable.outputs.latest_tag }})" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ env.MERGE_CONFLICT }}" == "true" ]; then
            echo "❌ Merge conflict detected for ${{ steps.find_stable.outputs.latest_tag }} - manual intervention required" >> $GITHUB_STEP_SUMMARY
            echo "An issue has been created to track this." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Successfully synced to upstream stable release ${{ steps.find_stable.outputs.latest_tag }}" >> $GITHUB_STEP_SUMMARY
          fi
